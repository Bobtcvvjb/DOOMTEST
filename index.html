<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JS Doom-like Engine with Ledges</title>
<style>
  body {
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  canvas { background:#222; }
</style>
</head>
<body>

<canvas id="game" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// --- World data ---
// walls: 1 = wall, 0 = empty
const walls = [
  "111111111111",
  "1..........1",
  "1..111.....1",
  "1..........1",
  "1.....111..1",
  "1..........1",
  "111111111111"
];

// floors: numbers = floor height level (0 = base, 1 = raised, etc.)
const floors = [
  "000000000000",
  "000000000000",
  "000111000000",
  "000111000000",
  "000111000000",
  "000000000000",
  "000000000000"
];

const MAP_W = walls[0].length;
const MAP_H = walls.length;

function getFloor(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return 0;
  const ch = floors[Math.floor(y)][Math.floor(x)];
  const level = parseInt(ch, 10) || 0;
  return level * 0.5; // each level = 0.5 units high
}

function isWall(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return true;
  return walls[Math.floor(y)][Math.floor(x)] === "1";
}

// --- Player ---
let px = 3.5;
let py = 3.5;
let playerHeight = 0.5;
let pz = getFloor(px, py) + playerHeight; // eye height
let pa = 0.0;
let fov = Math.PI / 3;
let moveSpeed = 3.0;

// --- Input ---
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

// --- Mouse look ---
let mouseSensitivity = 0.003;

canvas.addEventListener("click", () => {
  canvas.requestPointerLock();
});

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === canvas) {
    pa += e.movementX * mouseSensitivity;
  }
});

// --- Raycast with floor/ceiling ---
function castRay(rayAngle) {
  rayAngle = (rayAngle + Math.PI * 2) % (Math.PI * 2);

  const sin = Math.sin(rayAngle);
  const cos = Math.cos(rayAngle);

  const step = 0.02;
  let dist = 0;
  let hit = false;
  let hitX = 0, hitY = 0;

  for (let t = 0; t < 20; t += step) {
    const x = px + cos * t;
    const y = py + sin * t;
    if (isWall(x, y)) {
      dist = t;
      hit = true;
      hitX = x;
      hitY = y;
      break;
    }
  }

  if (!hit) {
    return {
      dist: 20,
      floor: 0,
      ceil: 2
    };
  }

  const diff = rayAngle - pa;
  dist *= Math.cos(diff);

  const floor = getFloor(hitX, hitY);
  const ceil = floor + 2.0; // constant ceiling height above floor

  return { dist, floor, ceil };
}

// --- Movement with stepping ---
function update(dt) {
  let dx = 0, dy = 0;

  const forward = keys["w"];
  const backward = keys["s"];
  const left = keys["a"];
  const right = keys["d"];

  if (forward) {
    dx += Math.cos(pa) * moveSpeed * dt;
    dy += Math.sin(pa) * moveSpeed * dt;
  }
  if (backward) {
    dx -= Math.cos(pa) * moveSpeed * dt;
    dy -= Math.sin(pa) * moveSpeed * dt;
  }
  if (left) {
    dx += Math.cos(pa - Math.PI/2) * moveSpeed * dt;
    dy += Math.sin(pa - Math.PI/2) * moveSpeed * dt;
  }
  if (right) {
    dx += Math.cos(pa + Math.PI/2) * moveSpeed * dt;
    dy += Math.sin(pa + Math.PI/2) * moveSpeed * dt;
  }

  const nx = px + dx;
  const ny = py + dy;

  const currentFloor = getFloor(px, py);
  const newFloor = getFloor(nx, ny);
  const stepHeight = newFloor - currentFloor;

  // allow small steps (ledges)
  const maxStep = 0.6;

  if (!isWall(nx, ny) && Math.abs(stepHeight) <= maxStep) {
    px = nx;
    py = ny;
    pz = newFloor + playerHeight;
  }
}

// --- Render ---
function render() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  const numRays = W;
  const halfH = H / 2;

  for (let x = 0; x < numRays; x++) {
    const rayScreenPos = (x / numRays) - 0.5;
    const rayAngle = pa + rayScreenPos * fov;

    const ray = castRay(rayAngle);
    const dist = ray.dist;

    // vertical projection
    const wallTop = halfH - ((ray.ceil - pz) / dist) * 300;
    const wallBottom = halfH - ((ray.floor - pz) / dist) * 300;

    // ceiling above wall
    ctx.fillStyle = "#202040";
    ctx.fillRect(x, 0, 1, wallTop);

    // wall
    const shade = Math.max(0, 1 - dist / 10);
    const c = Math.floor(200 * shade);
    ctx.fillStyle = `rgb(${c},${c},${c})`;
    ctx.fillRect(x, wallTop, 1, wallBottom - wallTop);

    // floor below wall
    ctx.fillStyle = "#303030";
    ctx.fillRect(x, wallBottom, 1, H - wallBottom);
  }

  // simple minimap
  const scale = 10;
  ctx.save();
  ctx.translate(10, 10);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (walls[y][x] === "1") ctx.fillStyle = "#888";
      else ctx.fillStyle = "#222";
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  // show raised floor area
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const f = getFloor(x + 0.1, y + 0.1);
      if (f > 0) {
        ctx.fillStyle = "#00aa00";
        ctx.fillRect(x * scale + 2, y * scale + 2, scale - 4, scale - 4);
      }
    }
  }
  ctx.fillStyle = "#ff0000";
  ctx.beginPath();
  ctx.arc(px * scale, py * scale, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// --- Loop ---
let lastTime = performance.now();

function loop(t) {
  const dt = (t - lastTime) / 1000;
  lastTime = t;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
